aid: exchangerate-api
name: ExchangeRate-API
description: ExchangeRate-API is a currency exchange rates API providing authoritative daily and
  intraday foreign exchange rates for 161 currencies. The v6 surface includes Latest, Pair,
  Enriched, Historical, Supported Codes, and Quota endpoints, plus a no-API-key Open Access
  endpoint at open.er-api.com that requires attribution.
image: https://www.exchangerate-api.com/img/logo.svg
url: https://raw.githubusercontent.com/api-evangelist/exchangerate-api/refs/heads/main/apis.yml
specificationVersion: '0.20'
created: '2026-05-28'
modified: '2026-05-29'
type: Index
access: 3rd-Party
x-source: public-apis/public-apis
x-category: Currency Exchange
x-tier: 3
x-tier-reason: bulk-registered-from-public-apis
tags:
